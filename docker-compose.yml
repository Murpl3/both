services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ezsakay
      POSTGRES_USER: ezsakay
      POSTGRES_PASSWORD: ezsakay_password
    ports:
      - "5432:5432"
    volumes:
      - ezsakay_pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgresql+psycopg2://ezsakay:ezsakay_password@db:5432/ezsakay
      CORS_ORIGINS: "*"
    ports:
      - "8000:8000"
    depends_on:
      - db

volumes:
  ezsakay_pgdata:

